name: medium
display_name: "Ordered Desk"
max_steps: 100
num_objects: 8
object_ids:
  - cube_plastic
  - mug_ceramic
  - book_paper
  - bottle_plastic
  - stapler_metal
  - notebook_paper
  - pen_holder_plastic
  - scissors_metal
targets:
  cube_plastic:      [0.45, 0.35, 0.78]
  mug_ceramic:       [0.10, 0.35, 0.78]
  book_paper:        [0.45, 0.15, 0.78]
  bottle_plastic:    [0.10, 0.15, 0.78]
  stapler_metal:     [0.28, 0.25, 0.78]
  notebook_paper:    [0.30, 0.10, 0.78]
  pen_holder_plastic: [0.50, 0.20, 0.78]
  scissors_metal:    [0.15, 0.20, 0.78]
blocking_pairs:
  # object_a blocks object_b: object_b cannot be reached until object_a is moved
  - blocked_by: book_paper
    blocks: notebook_paper
  - blocked_by: mug_ceramic
    blocks: pen_holder_plastic
reward_weights:
  cleanliness: 0.6
  order: 0.4
  safety: 0.0
placement_threshold: 0.05
