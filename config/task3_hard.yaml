name: hard
display_name: "Fragile Cleanup"
max_steps: 150
num_objects: 12
object_ids:
  - cube_plastic
  - mug_ceramic
  - book_paper
  - bottle_plastic
  - stapler_metal
  - notebook_paper
  - pen_holder_plastic
  - scissors_metal
  - glass_cup_glass
  - vase_fragile_ceramic
  - monitor_stand_metal
  - keyboard_plastic
targets:
  cube_plastic:         [0.45, 0.35, 0.78]
  mug_ceramic:          [0.10, 0.35, 0.78]
  book_paper:           [0.45, 0.15, 0.78]
  bottle_plastic:       [0.10, 0.15, 0.78]
  stapler_metal:        [0.28, 0.25, 0.78]
  notebook_paper:       [0.30, 0.10, 0.78]
  pen_holder_plastic:   [0.50, 0.20, 0.78]
  scissors_metal:       [0.15, 0.20, 0.78]
  glass_cup_glass:      [0.55, 0.40, 0.78]
  vase_fragile_ceramic: [0.05, 0.40, 0.78]
  monitor_stand_metal:  [0.28, 0.42, 0.78]
  keyboard_plastic:     [0.28, 0.05, 0.78]
blocking_pairs:
  - blocked_by: book_paper
    blocks: notebook_paper
  - blocked_by: mug_ceramic
    blocks: pen_holder_plastic
  - blocked_by: monitor_stand_metal
    blocks: glass_cup_glass
  - blocked_by: keyboard_plastic
    blocks: vase_fragile_ceramic
fragile_objects:
  - glass_cup_glass
  - vase_fragile_ceramic
constraint_sensitive_materials:
  glass:
    description: "Must not be placed on metal surfaces"
    forbidden_surface_materials:
      - metal
    destruction_penalty: 1.0
  fragile_ceramic:
    description: "Must not be stacked or dropped"
    max_drop_height: 0.05
    destruction_penalty: 1.0
reward_weights:
  cleanliness: 0.5
  order: 0.3
  safety: 0.2
placement_threshold: 0.05
